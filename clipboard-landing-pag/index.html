<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png" />

    <!-- 
        GOOGLE FONTS
      -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet" />

    <!-- 
        ICONS 
      -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.esm.js"></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.js"></script>

    <!-- 
        Custom CSS
      -->
    <link rel="stylesheet" href="./css/style.css" />

    <title>Frontend Mentor | Clipboard landing page</title>
  </head>
  <body>
    <!-- 
      HEADER
    -->
    <header class="header">
      <div class="logo">
        <img src="./images/logo.svg" alt="" />
      </div>
      <div class="header__content">
        <h1>A history of everything you copy</h1>
        <p>
          Clipboard allows you to track and organize everything you copy.
          Instantly access your clipboard on all your devices.
        </p>
        <div class="header__btn">
          <button class="btn btn--green">Download for iOS</button>
          <button class="btn btn--blue">Download for Mac</button>
        </div>
      </div>
    </header>
  </body>
</html>
