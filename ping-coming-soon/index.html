<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png" />

    <!-- 
        GOOGLE FONTS
      -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet" />

    <!-- 
        ICONS 
      -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.esm.js"></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.js"></script>

    <!-- 
        CUSTOM CSS
      -->
    <link rel="stylesheet" href="./css/style.css" />

    <title>Ping coming soon page</title>
  </head>
  <body>
    <!-- 
      Main
    -->
    <main class="main">
      <div class="container">
        <img src="./images/logo.svg" alt="Ping logo" class="logo" />
        <h1>We are launching <strong>soon!</strong></h1>
        <p class="subtitle">Subscribe and get notified</p>

        <form action="#" class="form" novalidate>
          <label for="email" class="visually-hidden"> Email address </label>
          <input
            type="email"
            name="email"
            id="email"
            aria-describedby="email-error"
            placeholder="Your email address..."
            aria-describedby="email-error" />
          <button type="submit">Notify Me</button>
          <p id="email-error" class="error-message" aria-live="polite"></p>
        </form>
      </div>

      <!-- 
        Illustration 
       -->
      <div class="illustration">
        <img
          src="./images/illustration-dashboard.png"
          alt="dashboard illustration" />
      </div>
    </main>

    <!-- 
      Footer
    -->
    <footer>
      <div class="socials">
        <a href="#" aria-label="Facebook">
          <ion-icon name="logo-facebook" aria-hidden="true"></ion-icon>
        </a>
        <a href="#" aria-label="Twitter">
          <ion-icon name="logo-twitter" aria-hidden="true"></ion-icon>
        </a>
        <a href="#" aria-label="Instagram">
          <ion-icon name="logo-instagram" aria-hidden="true"></ion-icon>
        </a>
      </div>

      <p>&copy; Copyright Ping. All rights reserved.</p>
    </footer>

    <script src="./js/script.js"></script>
  </body>
</html>
