<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png" />

    <title>
      Frontend Mentor | Huddle landing page with single introductory section
    </title>

    <!-- 
      Google Fonts
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet" />

    <!-- 
        Ions Icons
      -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.esm.js"></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7/dist/ionicons/ionicons.js"></script>

    <!-- 
      Custom Css
    -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="nav" aria-label="Main navigation">
        <img src="./images/logo.svg" alt="Huddle " class="huddle__logo-img" />
      </nav>
    </header>
    <main class="main">
      <section class="hero__section">
        <div class="container">
          <div class="image">
            <img
              src="./images/illustration-mockups.svg"
              alt="Illustration of the Huddle platform interface showing community discussions"
              class="huddle__img" />
          </div>
          <div class="content">
            <h1>Build The Community Your Fans Will Love</h1>
            <p>
              Huddle re-imagines the way we build communities. You have a voice,
              but so does your audience. Create connections with your users as
              you engage in genuine discussion.
            </p>
            <a href="/register" class="btn">Register</a>
          </div>
        </div>
      </section>
    </main>
    <div class="icons">
      <a href="#" aria-label="Visit our Facebook">
        <ion-icon name="logo-facebook"></ion-icon>
      </a>
      <a href="#" aria-label="Visit our Twitter">
        <ion-icon name="logo-twitter"></ion-icon>
      </a>
      <a href="#" aria-label="Visit our Instagram">
        <ion-icon name="logo-instagram"></ion-icon>
      </a>
    </div>
  </body>
</html>
